{% extends "base.html" %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center animate-fade-in-up">
    <div class="w-full max-w-md">
        <div class="bg-surface-card rounded-2xl shadow-xl border border-surface-border overflow-hidden">
            <div class="px-8 pt-10 pb-8">
                <!-- Header -->
                <div class="text-center mb-8">
                    <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-gradient-to-br from-semantic-emeraldLight to-semantic-emerald text-white shadow-lg mb-5">
                        <svg class="w-7 h-7" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7.5v3m0 0v3m0-3h3m-3 0h-3m-2.25-4.125a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zM4 19.235v-.11a6.375 6.375 0 0112.75 0v.109A12.318 12.318 0 0110.374 21c-2.331 0-4.512-.645-6.374-1.766z"/></svg>
                    </div>
                    <h1 class="text-2xl font-extrabold text-content tracking-tight">Create your account</h1>
                    <p class="mt-1.5 text-sm text-content-muted">Start tracking your finances in seconds</p>
                </div>
                
                <!-- Form -->
                <form action="{{ url_for('main.signup') }}" method="POST" class="space-y-5">
                    <div>
                        <label for="name" class="block text-xs font-semibold text-content-muted uppercase tracking-wider mb-1.5">Full Name</label>
                        <input id="name" name="name" type="text" required class="block w-full px-4 py-3 text-sm border border-surface-border rounded-xl bg-surface-input text-content focus:bg-surface-card focus:ring-2 focus:ring-semantic-emerald/20 focus:border-semantic-emerald transition-all" placeholder="Jane Doe">
                    </div>

                    <div>
                        <label for="email" class="block text-xs font-semibold text-content-muted uppercase tracking-wider mb-1.5">Email Address</label>
                        <input id="email" name="email" type="email" required class="block w-full px-4 py-3 text-sm border border-surface-border rounded-xl bg-surface-input text-content focus:bg-surface-card focus:ring-2 focus:ring-semantic-emerald/20 focus:border-semantic-emerald transition-all" placeholder="you@example.com">
                    </div>

                    <div>
                        <label for="password" class="block text-xs font-semibold text-content-muted uppercase tracking-wider mb-1.5">Password</label>
                        <input id="password" name="password" type="password" required class="block w-full px-4 py-3 text-sm border border-surface-border rounded-xl bg-surface-input text-content focus:bg-surface-card focus:ring-2 focus:ring-semantic-emerald/20 focus:border-semantic-emerald transition-all" placeholder="••••••••">
                    </div>

                    <button type="submit" class="w-full flex justify-center py-3 px-4 bg-semantic-emerald text-white text-sm font-semibold rounded-xl shadow-md hover:opacity-90 focus:outline-none focus:ring-2 focus:ring-semantic-emerald/40 focus:ring-offset-2 transition-all">
                        Create Account
                    </button>
                </form>
            </div>
            
            <div class="bg-surface-base border-t border-surface-border px-8 py-5 text-center">
                <p class="text-sm text-content-muted">
                    Already have an account? 
                    <a href="{{ url_for('main.login') }}" class="font-semibold text-primary hover:text-primary-hover transition-colors">Sign in</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
