{% extends "base.html" %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center animate-fade-in-up">
    <div class="w-full max-w-md">
        <div class="bg-surface-card rounded-2xl shadow-xl border border-surface-border overflow-hidden">
            <div class="px-8 pt-10 pb-8">
                <!-- Header -->
                <div class="text-center mb-8">
                    <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-gradient-to-br from-primary-light to-primary shadow-lg mb-5">
                        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/>
                        </svg>
                    </div>
                    <h1 class="text-2xl font-extrabold text-content tracking-tight">Set New Password</h1>
                    <p class="mt-1.5 text-sm text-content-muted">Enter your new password below</p>
                </div>
                
                <!-- Form -->
                <form action="{{ url_for('main.reset_password') }}" method="POST" class="space-y-5">
                    <div>
                        <label for="new_password" class="block text-xs font-semibold text-content-muted uppercase tracking-wider mb-1.5">New Password</label>
                        <input id="new_password" name="new_password" type="password" required class="block w-full px-4 py-3 text-sm border border-surface-border rounded-xl bg-surface-input text-content focus:bg-surface-card focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" placeholder="••••••••">
                    </div>
                    
                    <div>
                        <label for="confirm_password" class="block text-xs font-semibold text-content-muted uppercase tracking-wider mb-1.5">Confirm New Password</label>
                        <input id="confirm_password" name="confirm_password" type="password" required class="block w-full px-4 py-3 text-sm border border-surface-border rounded-xl bg-surface-input text-content focus:bg-surface-card focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" placeholder="••••••••">
                    </div>

                    <button type="submit" class="w-full flex justify-center py-3 px-4 bg-primary text-white text-sm font-semibold rounded-xl shadow-md hover:bg-primary-hover focus:outline-none focus:ring-2 focus:ring-primary/40 focus:ring-offset-2 transition-all">
                        Reset Password
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
